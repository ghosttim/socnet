global:
  scrape_interval: 5s

scrape_configs:

  - job_name: postgres-master
    static_configs:
      - targets: ['postgres-exporter-master:9187']

  - job_name: postgres-replica1
    static_configs:
      - targets: ['postgres-exporter-replica1:9187']

  - job_name: postgres-replica2
    static_configs:
      - targets: ['postgres-exporter-replica2:9187']