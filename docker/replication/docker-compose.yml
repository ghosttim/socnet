version: '3.8'

services:
  dbslave:
    image: postgres:15-alpine
    container_name: socnet-db-replica
    restart: unless-stopped
    ports:
      - "15432:5432"
    volumes:
      - ./volumes/dbslave:/var/lib/postgresql/data:rw
    environment:
      - POSTGRES_PASSWORD=password123
      - POSTGRES_USER=postgres
    user: postgres
    networks:
      - socnet-network

  dbslave2:
    image: postgres:15-alpine
    container_name: socnet-db-replica-async
    restart: unless-stopped
    ports:
      - "25432:5432"
    volumes:
      - ./volumes/dbslave2:/var/lib/postgresql/data:rw
    environment:
      - POSTGRES_PASSWORD=password123
      - POSTGRES_USER=postgres
    user: postgres
    networks:
      - socnet-network

networks:
  socnet-network:
    name: socnet_socnet-network